name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  quality:
    runs-on: macos-26
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install validation tools
        run: brew install actionlint shellcheck swiftlint xcodegen

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version
          xcodegen --version
          swiftlint version

      - name: Run all quality gates
        run: make check
