name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  quality:
    runs-on: macos-26
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install validation tools
        run: brew install actionlint shellcheck swiftlint xcodegen

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version
          xcodegen --version
          swiftlint version

      - name: Run all quality gates
        run: make check
