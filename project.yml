name: Resonance
options:
  bundleIdPrefix: dev.jacoblincool
  developmentLanguage: en
  createIntermediateGroups: true
  defaultConfig: Release
configs:
  Debug: debug
  Release: release
  AppStore: release
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "2"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: "NO"
    ENABLE_APP_SANDBOX: "YES"
    ENABLE_OUTGOING_NETWORK_CONNECTIONS: "YES"
targets:
  Resonance:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources
      - path: Resources/Assets.xcassets
      - path: Resources/PrivacyInfo.xcprivacy
      - path: Resources/Localizable.xcstrings
      - path: Resources/InfoPlist.xcstrings
    settings:
      base:
        PRODUCT_NAME: Resonance
        PRODUCT_BUNDLE_IDENTIFIER: dev.jacoblincool.Resonance
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/Resonance.entitlements
        COMBINE_HIDPI_IMAGES: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  ResonanceTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Tests
    dependencies:
      - target: Resonance
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
schemes:
  Resonance:
    build:
      targets:
        Resonance: all
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - name: ResonanceTests
          parallelizable: true
          randomExecutionOrder: true
    archive:
      config: AppStore
